<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="plate1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b9bd5"/>
      <stop offset="100%" stop-color="#2e75b6"/>
    </linearGradient>
    <linearGradient id="plate2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a8ac4"/>
      <stop offset="100%" stop-color="#1f5da0"/>
    </linearGradient>
    <linearGradient id="plate3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a7ab3"/>
      <stop offset="100%" stop-color="#134b8a"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8d4f0"/>
      <stop offset="100%" stop-color="#7fc4e8"/>
    </linearGradient>
    <linearGradient id="lock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6aa8"/>
      <stop offset="100%" stop-color="#0d3f70"/>
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="248" fill="#1a1a2e"/>
  <circle cx="256" cy="256" r="244" fill="#16213e"/>

  <g transform="translate(256,256) scale(0.55)">
    <!-- 中间横杆 -->
    <rect x="-130" y="-22" width="260" height="44" rx="14" fill="url(#bar)" stroke="#3a3480" stroke-width="4"/>
    <!-- 横杆高光 -->
    <rect x="-130" y="-16" width="260" height="12" rx="6" fill="white" opacity="0.3"/>

    <!-- === 左侧配重片 === -->
    <!-- 第1片（最大） -->
    <ellipse cx="-135" cy="0" rx="44" ry="80" fill="url(#plate1)" stroke="#3a3480" stroke-width="4"/>
    <ellipse cx="-139" cy="-25" rx="12" ry="35" fill="white" opacity="0.25" transform="rotate(-15,-139,-25)"/>

    <!-- 第2片（中） -->
    <ellipse cx="-155" cy="0" rx="34" ry="65" fill="url(#plate2)" stroke="#3a3480" stroke-width="4"/>
    <ellipse cx="-159" cy="-20" rx="10" ry="28" fill="white" opacity="0.25" transform="rotate(-15,-159,-20)"/>

    <!-- 第3片（小） -->
    <ellipse cx="-170" cy="0" rx="26" ry="50" fill="url(#plate3)" stroke="#3a3480" stroke-width="4"/>
    <ellipse cx="-174" cy="-15" rx="8" ry="22" fill="white" opacity="0.25" transform="rotate(-15,-174,-15)"/>

    <!-- 左锁扣 -->
    <rect x="-195" y="-18" width="22" height="36" rx="6" fill="url(#lock)" stroke="#3a3480" stroke-width="4"/>
    <rect x="-195" y="-8" width="22" height="6" rx="2" fill="white" opacity="0.2"/>

    <!-- === 右侧配重片 === -->
    <!-- 第1片（最大） -->
    <ellipse cx="135" cy="0" rx="44" ry="80" fill="url(#plate1)" stroke="#3a3480" stroke-width="4"/>
    <ellipse cx="131" cy="-25" rx="12" ry="35" fill="white" opacity="0.25" transform="rotate(15,131,-25)"/>

    <!-- 第2片（中） -->
    <ellipse cx="155" cy="0" rx="34" ry="65" fill="url(#plate2)" stroke="#3a3480" stroke-width="4"/>
    <ellipse cx="151" cy="-20" rx="10" ry="28" fill="white" opacity="0.25" transform="rotate(15,151,-20)"/>

    <!-- 第3片（小） -->
    <ellipse cx="170" cy="0" rx="26" ry="50" fill="url(#plate3)" stroke="#3a3480" stroke-width="4"/>
    <ellipse cx="166" cy="-15" rx="8" ry="22" fill="white" opacity="0.25" transform="rotate(15,166,-15)"/>

    <!-- 右锁扣 -->
    <rect x="173" y="-18" width="22" height="36" rx="6" fill="url(#lock)" stroke="#3a3480" stroke-width="4"/>
    <rect x="173" y="-8" width="22" height="6" rx="2" fill="white" opacity="0.2"/>
  </g>
</svg>
