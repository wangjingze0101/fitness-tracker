<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <circle cx="256" cy="256" r="250" fill="#22c55e"/>
  <!-- 手臂主体 - 浅橙色填充，无外轮廓 -->
  <g transform="translate(110,60) scale(1.15)">
    <!-- 手臂主形状 - 弯曲的L形线条 -->
    <path d="
      M 40,320
      C 45,310 50,300 60,290
      C 75,260 80,230 70,200
      C 65,180 55,165 50,155
      C 45,140 50,125 60,115
      C 70,105 85,100 100,98
      C 120,95 145,100 165,105
      C 180,108 190,105 195,95
      C 200,85 205,75 215,70
      C 225,65 235,62 245,65
      C 255,68 258,75 255,85
      C 252,95 245,100 235,100
      C 220,100 205,100 195,108
      C 185,115 175,130 170,145
      C 165,160 165,175 170,190
      C 175,210 190,225 200,235
      C 210,245 210,250 205,255
      C 195,265 180,270 160,270
      C 140,270 120,265 105,260
      C 90,255 75,250 65,255
      C 55,260 50,275 48,290
      C 45,305 42,315 40,320
      Z
    " fill="#f5cba7"/>

    <!-- 前臂肌肉线 -->
    <path d="M 190,130 Q 175,190 160,250" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 肘部横线 -->
    <path d="M 110,220 Q 130,215 155,230" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 二头肌大弧线 -->
    <path d="M 80,180 Q 60,210 70,240 Q 80,255 95,260" fill="none" stroke="#a0522d" stroke-width="3" stroke-linecap="round"/>

    <!-- 二头肌波浪线 -->
    <path d="M 90,200 Q 100,190 115,195 Q 125,200 130,210" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>

    <!-- 二头肌短弧线 -->
    <path d="M 100,230 Q 110,225 120,230" fill="none" stroke="#a0522d" stroke-width="2" stroke-linecap="round"/>

    <!-- 拳头上部四指节线（从长到短） -->
    <path d="M 210,88 Q 225,85 240,88" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 212,95 Q 225,92 237,95" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 215,102 Q 224,99 233,102" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 220,108 Q 226,106 232,108" fill="none" stroke="#a0522d" stroke-width="2" stroke-linecap="round"/>

    <!-- 三角肌暗示 -->
    <path d="M 50,280 Q 35,275 30,260" fill="none" stroke="#a0522d" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
