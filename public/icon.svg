<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <!-- 绿色圆形背景 -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>
  <!-- 肱二头肌手臂 -->
  <g transform="translate(256,256) scale(0.6)" fill="white">
    <!-- 上臂弯曲 -->
    <path d="M-30,-120 C-30,-180 30,-180 30,-120 L50,-40 C55,10 50,80 0,120 C-50,80 -55,10 -50,-40 Z"/>
    <!-- 二头肌鼓包 -->
    <ellipse cx="10" cy="-30" rx="45" ry="35"/>
    <!-- 拳头 -->
    <circle cx="0" cy="130" r="35"/>
    <circle cx="-10" cy="115" r="12"/>
    <circle cx="10" cy="115" r="12"/>
    <circle cx="-18" cy="135" r="12"/>
    <circle cx="18" cy="135" r="12"/>
    <circle cx="0" cy="145" r="12"/>
  </g>
</svg>
